services:
  eta-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: eta-predictor:latest
    container_name: eta-predictor-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      PYTHONUNBUFFERED: "1"
      MLFLOW_TRACKING_URI: "http://mlflow-server:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      - mlflow-server
    networks:
      - sprint-network

  mlflow-server:
    image: python:3.12-slim
    container_name: mlflow-tracking
    command: >
      bash -c "pip install --no-cache-dir 'mlflow>=3.11.1,<4.0.0' &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - sprint-network
    restart: unless-stopped

volumes:
  mlflow-data:

networks:
  sprint-network:
    driver: bridge
